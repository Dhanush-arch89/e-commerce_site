<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Aura</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/globals.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <nav class="navbar" id="main-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="text-gradient">AURA.</span>
            </a>
            
            <div class="nav-links">
                <a href="index.html" class="nav-link">Catalogue</a>
                <a href="tracking.html" class="nav-link">Track Order</a>
                <a href="admin.html" class="nav-link" id="admin-nav-link" style="display: none;">Admin</a>
            </div>
            
            <div class="nav-actions">
                <a href="auth.html" class="btn btn-outline" id="auth-btn">Sign In</a>
                
                <a href="cart.html" class="icon-btn active" aria-label="Shopping Cart">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content container animate-fade-in" id="app-root">
       <div class="section-header" style="margin-top: 2rem;">
           <h1>Your <span class="text-gradient">Cart</span></h1>
       </div>
       
       <div class="cart-container">
           <!-- Dynamic Iterated Items -->
           <div class="cart-items" id="cart-items-container">
               <!-- Rendered via cart.js -->
           </div>
           
           <!-- Fixed Summary Sidebar -->
           <div class="cart-summary glass-panel">
               <h3 style="margin-bottom: 2rem;">Order Summary</h3>
               <div class="summary-row">
                   <span>Subtotal</span>
                   <span id="summary-subtotal">₹0.00</span>
               </div>
               <div class="summary-row">
                   <span>Estimated Shipping</span>
                   <span id="summary-shipping">₹0.00</span>
               </div>
               <div class="summary-row">
                   <span>Estimated Tax</span>
                   <span id="summary-tax">₹0.00</span>
               </div>
               <div class="summary-row total">
                   <span>Total</span>
                   <span class="text-gradient" id="summary-total">₹0.00</span>
               </div>
               <button class="btn btn-primary checkout-btn" id="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
           </div>
       </div>
    </main>

    <script src="js/app.js?v=2"></script>
    <script src="js/cart.js"></script>
</body>
</html>
