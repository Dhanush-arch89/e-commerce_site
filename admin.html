<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Aura</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/globals.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <nav class="navbar" id="main-nav" style="border-bottom: 1px solid var(--border);">
        <div class="nav-container" style="max-width: 100%; padding: 0 3rem;">
            <a href="admin.html" class="logo">
                <span class="text-gradient">AURA.</span> 
                <span style="font-size: 1rem; font-weight: 400; color:var(--text-muted); margin-left: 0.5rem; border-left: 1px solid var(--border); padding-left: 0.5rem;">Admin</span>
            </a>
            <div class="nav-actions">
                <a href="auth.html" class="btn btn-outline" id="auth-btn">Sign In</a>
            </div>
        </div>
    </nav>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-menu">
                <a href="#" class="sidebar-link active" data-view="dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
                <a href="#" class="sidebar-link" data-view="orders">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    Orders
                </a>
                <a href="#" class="sidebar-link" data-view="products">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                    Products
                </a>
                <a href="#" class="sidebar-link" data-view="customers">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Customers
                </a>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="admin-content animate-fade-in">
            <div class="admin-header">
                <div>
                    <h2>Overview</h2>
                    <p style="color: var(--text-muted); margin-top: 0.25rem;">Welcome back to your command center.</p>
                </div>
                <button class="btn btn-primary" id="add-product-btn" style="display: none;">+ Add Product</button>
            </div>

            <!-- Dashboard Stats -->
            <div class="stats-grid" id="admin-stats">
                <!-- Injected via JS -->
            </div>

            <!-- Dynamic Workspace (Tables, Views) -->
            <div id="admin-workspace">
                <!-- Injected via JS -->
            </div>
        </main>
    </div>

    <!-- Add Product Modal -->
    <div class="modal-overlay" id="product-modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Add New Product</h3>
                <button class="modal-close-btn" id="modal-cancel-btn" aria-label="Close modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <form id="add-product-form">
                <div class="form-group">
                    <label for="prod-title">Product Title</label>
                    <input type="text" id="prod-title" class="glass-input" placeholder="e.g. Premium Wireless Headphones" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="prod-price">Price ($)</label>
                        <input type="number" id="prod-price" class="glass-input" step="0.01" min="0.01" placeholder="99.99" required>
                    </div>
                    <div class="form-group">
                        <label for="prod-category">Category</label>
                        <select id="prod-category" class="glass-input" required>
                            <option value="electronics">Electronics</option>
                            <option value="fashion">Fashion</option>
                            <option value="home">Home & Living</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="prod-image">Image URL</label>
                    <input type="url" id="prod-image" class="glass-input" placeholder="https://images.unsplash.com/..." required>
                </div>
                <div class="form-group">
                    <label for="prod-badge">Badge <span style="color:var(--text-muted); font-weight:400;">(optional)</span></label>
                    <input type="text" id="prod-badge" class="glass-input" placeholder="e.g. New, Sale, Best Seller">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeProductModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Logic -->
    <script src="js/app.js?v=2"></script>
    <script src="js/admin.js"></script>
</body>
</html>
