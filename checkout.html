<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Aura</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/globals.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>
    <nav class="navbar" id="main-nav">
        <div class="nav-container" style="justify-content: center;">
            <a href="index.html" class="logo">
                <span class="text-gradient">AURA.</span> Checkout
            </a>
        </div>
    </nav>

    <main class="main-content container animate-fade-in" id="app-root">
       <div class="checkout-container">
           
           <!-- Checkout Form -->
           <div class="checkout-form">
               <form id="checkout-form">
                   
                   <div class="checkout-section glass-panel">
                       <h3>Shipping Address</h3>
                       <div class="form-row">
                           <div class="form-col">
                               <label class="form-label">First Name</label>
                               <input type="text" class="form-input" required>
                           </div>
                           <div class="form-col">
                               <label class="form-label">Last Name</label>
                               <input type="text" class="form-input" required>
                           </div>
                       </div>
                       <div class="form-row">
                           <div class="form-col">
                               <label class="form-label">Address</label>
                               <input type="text" class="form-input" required>
                           </div>
                       </div>
                       <div class="form-row">
                           <div class="form-col">
                               <label class="form-label">City</label>
                               <input type="text" class="form-input" required>
                           </div>
                           <div class="form-col">
                               <label class="form-label">Zip Code</label>
                               <input type="text" class="form-input" required>
                           </div>
                       </div>
                   </div>

                   <div class="checkout-section glass-panel">
                       <h3>Payment Method</h3>
                       <div class="payment-methods">
                           <div class="payment-method selected" onclick="selectPayment(this)">
                               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                               Credit Card
                           </div>
                           <div class="payment-method" onclick="selectPayment(this)">
                               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                               Crypto
                           </div>
                       </div>
                       
                       <div class="form-row">
                           <div class="form-col">
                               <label class="form-label">Card Number</label>
                               <input type="text" class="form-input" placeholder="0000 0000 0000 0000" pattern="[0-9 ]{16,19}" required>
                           </div>
                       </div>
                       <div class="form-row">
                           <div class="form-col">
                               <label class="form-label">Expiry (MM/YY)</label>
                               <input type="text" class="form-input" placeholder="MM/YY" required>
                           </div>
                           <div class="form-col">
                               <label class="form-label">CVC</label>
                               <input type="text" class="form-input" placeholder="123" required>
                           </div>
                       </div>
                   </div>

               </form>
           </div>
           
           <!-- Order Summary -->
           <div class="order-summary glass-panel">
               <h3>Order Summary</h3>
               <div id="checkout-items">
                   <!-- Injected via JS -->
               </div>
               
               <div class="summary-divider"></div>
               
               <div class="summary-item">
                   <span class="summary-item-title">Subtotal</span>
                   <span id="chk-subtotal">$0.00</span>
               </div>
               <div class="summary-item">
                   <span class="summary-item-title">Shipping</span>
                   <span id="chk-shipping">$0.00</span>
               </div>
               <div class="summary-item">
                   <span class="summary-item-title">Tax</span>
                   <span id="chk-tax">$0.00</span>
               </div>
               
               <div class="summary-divider"></div>
               
               <div class="total-row">
                   <span>Total</span>
                   <span class="text-gradient" id="chk-total">$0.00</span>
               </div>
               
               <button type="submit" form="checkout-form" class="btn btn-primary complete-order-btn" id="submit-order-btn">Pay Now</button>
           </div>
           
       </div>
    </main>

    <!-- Success Modal -->
    <div class="modal-overlay" id="success-modal">
        <div class="modal-content">
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2>Payment <span class="text-gradient">Successful</span></h2>
            <p style="margin: 1rem 0 2rem; color: var(--text-muted);">Thank you for your order! Your tracking number is #<strong id="mock-tracking"></strong>.</p>
            <a href="tracking.html" class="btn btn-primary" style="width: 100%;">Track Order</a>
            <a href="index.html" class="btn btn-outline" style="width: 100%; margin-top: 1rem;">Continue Shopping</a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
